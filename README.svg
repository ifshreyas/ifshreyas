<svg xmlns="http://www.w3.org/2000/svg" width="820" height="760" viewBox="0 0 820 760">
  <defs>
    <style>
      .bg { fill: #06121a; }
      .panel { fill: #071826; stroke: #0e2a34; stroke-width:2; rx:10; ry:10; }
      .mono { font-family: "Fira Code", "Courier New", monospace; font-size:14px; }
      .title { font-size:16px; font-weight:700; fill:#ffd580; }
      .username { fill:#ffa94d; font-weight:700; }
      .muted { fill:#5f6d76; }    /* separators / dim text */
      .label { fill:#72d386; }    /* green labels */
      .value { fill:#cfe8ff; }    /* pale value text */
      .accent1 { fill:#ffb86b; }  /* orange */
      .accent2 { fill:#4fd2ff; }  /* cyan */
      .accent3 { fill:#ff7ab6; }  /* pink */
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="820" height="760" rx="0" ry="0" />

  <!-- Outer panel -->
  <g transform="translate(20,20)">
    <rect class="panel" x="0" y="0" width="780" height="700" rx="8" ry="8"/>

    <!-- Header -->
    <text class="mono title" x="24" y="40"> _________________________________</text>
    <text class="mono" x="24" y="64">
      <tspan class="username">ifshreyas@dev</tspan>
      <tspan class="muted">  -----------------</tspan>
    </text>

    <text class="mono muted" x="24" y="90">|---------------------------------|</text>

    <!-- Content layout constants:
         left x for labels = 30
         left x for values = 190
         starting y = 114
         line height = 22
    -->
    <!-- System info -->
    <g class="mono">
      <text x="30" y="114" class="label">| OS:</text>
      <text x="190" y="114" class="value">Windows 10, Android 14, Linux</text>

      <text x="30" y="136" class="label">| Uptime:</text>
      <text x="190" y="136" class="value">19 years, 11 months</text>

      <text x="30" y="158" class="label">| Host:</text>
      <text x="190" y="158" class="value">Github@Local</text>

      <text x="30" y="180" class="label">| Kernel:</text>
      <text x="190" y="180" class="value">Shreyas Pathak</text>

      <text x="30" y="202" class="label">| IDE:</text>
      <text x="190" y="202" class="value">IDEA 2023.3.2, VSCode 1.96.0</text>

      <text x="24" y="226" class="muted">|---------------------------------|</text>

      <!-- About block header -->
      <text x="30" y="250" class="label">| About:</text>

      <!-- About wrapped to fixed lines, no overlaps -->
      <text x="30" y="272" class="value">
        <tspan x="30" dy="0">|  A software developer driven by curiosity, ambition, and the desire</tspan>
        <tspan x="30" dy="20">|  to build things that stand out. From AI agents and web applications</tspan>
        <tspan x="30" dy="20">|  to operating system experiments, I enjoy turning bold ideas into</tspan>
        <tspan x="30" dy="20">|  real projects while constantly learning and pushing my limits.</tspan>
      </text>

      <text x="24" y="352" class="muted">|---------------------------------|</text>

      <!-- Languages -->
      <text x="30" y="374" class="label">| Languages.Programming:</text>
      <text x="300" y="374" class="accent1">Python, JavaScript, C++</text>

      <text x="30" y="396" class="label">| Languages.Computer:</text>
      <text x="300" y="396" class="accent2">HTML, CSS, JSON, LaTeX, YAML</text>

      <text x="30" y="418" class="label">| Languages.Real:</text>
      <text x="300" y="418" class="value">English, Hindi</text>

      <text x="24" y="442" class="muted">|---------------------------------|</text>

      <!-- Hobbies -->
      <text x="30" y="464" class="label">| Hobbies.Software:</text>
      <text x="300" y="464" class="accent3">Rockstar Modding, Music</text>

      <text x="30" y="486" class="label">| Hobbies.Hardware:</text>
      <text x="300" y="486" class="accent1">Overclocking, Undervolting</text>

      <text x="24" y="510" class="muted">|---------------------------------|</text>

      <!-- Contact -->
      <text x="30" y="532" class="label">| Contact</text>

      <text x="30" y="554" class="label">| Email.Personal:</text>
      <text x="300" y="554" class="value">pathakshreyas004@gmail.com</text>

      <text x="30" y="576" class="label">| Email.Personal (alt):</text>
      <text x="300" y="576" class="value">shreyaspathak81@gmail.com</text>

      <text x="30" y="598" class="label">| Email.Work:</text>
      <text x="300" y="598" class="value">Andrew.Grant@ttmtech.com</text>

      <text x="30" y="620" class="label">| LinkedIn:</text>
      <text x="300" y="620" class="accent3">Shreyaspathakk</text>

      <text x="30" y="642" class="label">| Threads:</text>
      <text x="300" y="642" class="accent3">secondequation</text>

      <text x="24" y="666" class="muted">|---------------------------------|</text>

      <!-- GitHub Stats -->
      <text x="30" y="688" class="label">| GitHub Stats:</text>

      <text x="30" y="710" class="label">| Repos:</text>
      <text x="160" y="710" class="accent1">9</text>
    </g>

    <!-- bottom border (inside panel) -->
    <text class="mono muted" x="24" y="732">|__________________________________|</text>
  </g>
</svg>
