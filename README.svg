<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540">
  <defs>
    <style><![CDATA[
      /* Colors and font */
      .bg { fill: #06121a; }
      .panel { fill: #071826; stroke: #0e2a34; stroke-width:2; rx:10; ry:10; }
      .mono { font-family: "Fira Code", "Courier New", monospace; font-size:14px; }
      .title { font-size:16px; font-weight:700; fill:#ffd580; }
      .username { fill:#ffa94d; font-weight:700; }
      .sep { fill:#0fb6ff; }
      .label { fill:#72d386; }   /* green labels */
      .value { fill:#cfe8ff; }   /* pale value text */
      .muted { fill:#5f6d76; }   /* separators / dim text */
      .accent1 { fill:#ffb86b; } /* orange values */
      .accent2 { fill:#4fd2ff; } /* cyan values */
      .accent3 { fill:#ff7ab6; } /* pink values */
      ]]></style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="900" height="540" rx="0" ry="0"/>

  <!-- Outer panel -->
  <g transform="translate(30,20)">
    <rect class="panel" x="0" y="0" width="840" height="500" rx="8" ry="8"/>

    <!-- header -->
    <text class="mono title" x="18" y="36"> _________________________________</text>
    <text class="mono" x="18" y="60">
      <tspan class="username">ifshreyas@dev</tspan>
      <tspan class="muted">  -----------------</tspan>
    </text>

    <!-- thin separator -->
    <text class="mono muted" x="18" y="86">|---------------------------------|</text>

    <!-- Layout constants:
         left column label X = 24
         left column value X = 200
         right column label X = 420
         right column value X = 620
         baseline start Y = 110
         line height = 22
    -->

    <!-- Left column content -->
    <g class="mono">
      <!-- baseline and spacing -->
      <!-- Row 0 -->
      <text x="24" y="110" class="label">| OS:</text>
      <text x="200" y="110" class="value">Windows 10, Android 14, Linux</text>

      <!-- Row 1 -->
      <text x="24" y="132" class="label">| Uptime:</text>
      <text x="200" y="132" class="value">22 years, 5 months, 29 days</text>

      <!-- Row 2 -->
      <text x="24" y="154" class="label">| Host:</text>
      <text x="200" y="154" class="value">TTM Technologies, Inc.</text>

      <!-- Row 3 -->
      <text x="24" y="176" class="label">| Kernel:</text>
      <text x="200" y="176" class="value">CAM (Computer Aided Manufacturing) Operator</text>

      <!-- Row 4 -->
      <text x="24" y="198" class="label">| IDE:</text>
      <text x="200" y="198" class="value">IDEA 2023.3.2, VSCode 1.96.0</text>

      <!-- divider -->
      <text x="18" y="222" class="muted">|---------------------------------|</text>

      <!-- About header -->
      <text x="24" y="246" class="label">| About:</text>

      <!-- About wrapped lines (kept same left value X as labels to mimic terminal look) -->
      <text x="24" y="268" class="value">
        <tspan x="24" dy="0">|  A software developer driven by curiosity, ambition, and the desire</tspan>
        <tspan x="24" dy="20">|  to build things that stand out. From AI agents and web applications</tspan>
        <tspan x="24" dy="20">|  to operating system experiments, I enjoy turning bold ideas into</tspan>
        <tspan x="24" dy="20">|  real projects while constantly learning and pushing my limits.</tspan>
      </text>

      <text x="18" y="356" class="muted">|---------------------------------|</text>

      <!-- Languages rows -->
      <text x="24" y="378" class="label">| Languages.Programming:</text>
      <text x="300" y="378" class="accent1">Java, Python, JavaScript, C++</text>

      <text x="24" y="400" class="label">| Languages.Computer:</text>
      <text x="300" y="400" class="accent2">HTML, CSS, JSON, LaTeX, YAML</text>

      <text x="24" y="422" class="label">| Languages.Real:</text>
      <text x="300" y="422" class="value">English, Spanish</text>

      <text x="18" y="446" class="muted">|---------------------------------|</text>
    </g>

    <!-- Right column content -->
    <g class="mono">
      <text x="420" y="110" class="label">| Hobbies.Software:</text>
      <text x="620" y="110" class="accent3">Minecraft Modding, iOS Jailbreaking</text>

      <text x="420" y="132" class="label">| Hobbies.Hardware:</text>
      <text x="620" y="132" class="accent1">Overclocking, Undervolting</text>

      <text x="414" y="156" class="muted">|---------------------------------|</text>

      <text x="420" y="178" class="label">| Contact</text>

      <text x="420" y="200" class="label">| Email.Personal:</text>
      <text x="620" y="200" class="value">agranntnmac@gmail.com</text>

      <text x="420" y="222" class="label">| Email.Personal:</text>
      <text x="620" y="222" class="value">andrew@grant.software</text>

      <text x="420" y="244" class="label">| Email.Work:</text>
      <text x="620" y="244" class="value">Andrew.Grant@ttmtech.com</text>

      <text x="420" y="266" class="label">| LinkedIn:</text>
      <text x="620" y="266" class="accent3">AndrewGrant</text>

      <text x="420" y="288" class="label">| Discord:</text>
      <text x="620" y="288" class="accent3">andrew0rant</text>

      <text x="414" y="312" class="muted">|---------------------------------|</text>

      <text x="420" y="334" class="label">| GitHub Stats:</text>

      <text x="420" y="356" class="label">| Repos:</text>
      <text x="520" y="356" class="accent1">95</text>
      <text x="560" y="356" class="muted"> {Contributed: 133} | Stars:</text>
      <text x="720" y="356" class="accent2">342</text>

      <text x="420" y="378" class="label">| Commits:</text>
      <text x="520" y="378" class="accent1">2,116</text>
      <text x="600" y="378" class="muted"> | Followers:</text>
      <text x="720" y="378" class="accent2">196</text>

      <text x="420" y="400" class="label">| Lines of Code on GitHub:</text>
      <text x="620" y="400" class="accent1">446,276</text>
      <text x="720" y="400" class="muted"> (523,178+, 76,902--)</text>
    </g>

    <!-- bottom border -->
    <text class="mono muted" x="18" y="482">|__________________________________|</text>
  </g>
</svg>
